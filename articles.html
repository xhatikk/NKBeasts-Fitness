<!doctype html><html lang="sq"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NKBEASTS Guide</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;background:#05070a;color:#f6f2e9;font-family:Inter,sans-serif}.top{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:18px 5vw;background:#05070af2;border-bottom:1px solid #252d37}.brand{font-weight:900;letter-spacing:2px;color:#e4b43d}.back{color:#e4b43d;font-weight:800}.wrap{width:min(900px,90vw);margin:55px auto 90px}.kicker{color:#e4b43d;font-weight:800;letter-spacing:2px}.wrap h1{font:clamp(52px,8vw,88px)/.92 "Bebas Neue";margin:12px 0 25px}.hero{width:100%;height:360px;object-fit:cover;border-radius:14px;margin-bottom:28px}.content{font-size:17px;line-height:1.8;color:#c9ced5}.content h2{font:38px "Bebas Neue";color:#f6f2e9;margin-top:38px}.content ul{padding-left:22px}.box{margin:22px 0;padding:20px;border-left:4px solid #e4b43d;background:#0c1118}.lang{display:flex;gap:8px}.lang button{border:1px solid #303844;border-radius:50%;width:38px;height:38px;background:#090d12;color:white;font-weight:800}.lang button.active{background:#e4b43d;color:#111}@media(max-width:600px){.hero{height:230px}.wrap{margin-top:35px}.content{font-size:16px}}</style></head><body><header class="top"><a class="back" href="index.html#nutrition">← NKBEASTS</a><div class="lang"><button data-lang="sq">SQ</button><button data-lang="de">DE</button><button data-lang="en">EN</button></div></header><main class="wrap"><div class="kicker">NKBEASTS LIBRARY</div><h1 id="title"></h1><img id="image" class="hero" alt=""><article id="content" class="content"></article></main><script>
const guides={
protein:{image:'https://images.unsplash.com/photo-1606787366850-de6330128bfc?auto=format&fit=crop&w=1400&q=85',sq:['PROTEINA — GUIDA E PLOTË',`<p>Proteina është materiali ndërtues i muskujve dhe ndihmon rikuperimin e ngopjen.</p><h2>Sa duhet të konsumosh?</h2><ul><li>0.8 g/kg: minimumi i përgjithshëm</li><li>1.2–1.6 g/kg: person aktiv</li><li>1.6–2.2 g/kg: rritje muskulore</li><li>1.8–2.4 g/kg: deficit kalorik</li></ul><div class="box"><b>Shembull:</b> 80 kg × 1.8 g = rreth 144 g proteinë në ditë.</div><h2>Burimet më të mira</h2><p>Pulë, peshk, vezë, kos grek, gjizë, fasule, thjerrëza dhe tofu. Whey përdoret si plotësim praktik, jo si zëvendësim i ushqimit.</p><h2>Shpërndarja</h2><p>Ndarja në 3–5 vakte me 25–45 g për vakt është zakonisht zgjidhja më praktike.</p>`],de:['PROTEIN — KOMPLETTER GUIDE',`<p>Protein unterstützt Muskelaufbau, Regeneration und Sättigung.</p><h2>Tägliche Menge</h2><ul><li>0,8 g/kg: allgemeines Minimum</li><li>1,2–1,6 g/kg: aktive Personen</li><li>1,6–2,2 g/kg: Muskelaufbau</li><li>1,8–2,4 g/kg: Kaloriendefizit</li></ul><div class="box"><b>Beispiel:</b> 80 kg × 1,8 g = etwa 144 g täglich.</div><h2>Gute Quellen</h2><p>Geflügel, Fisch, Eier, Magerquark, Hülsenfrüchte und Tofu.</p>`],en:['PROTEIN — COMPLETE GUIDE',`<p>Protein supports muscle repair, growth and satiety.</p><h2>Daily amount</h2><ul><li>0.8 g/kg: general minimum</li><li>1.2–1.6 g/kg: active people</li><li>1.6–2.2 g/kg: muscle gain</li><li>1.8–2.4 g/kg: calorie deficit</li></ul><div class="box"><b>Example:</b> 80 kg × 1.8 g = about 144 g daily.</div><h2>Good sources</h2><p>Poultry, fish, eggs, Greek yogurt, legumes and tofu.</p>`]},
carbs:{image:'https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1400&q=85',sq:['KARBOHIDRATET — ENERGJIA E TRUPIT',`<p>Karbohidratet janë burimi kryesor i energjisë për aktivitet dhe stërvitje intensive.</p><h2>Sa duhet?</h2><ul><li>2–3 g/kg: aktivitet i ulët</li><li>3–5 g/kg: fitness i rregullt</li><li>5–7 g/kg: stërvitje e lartë</li></ul><h2>Zgjidh më shpesh</h2><p>Tërshërë, oriz, patate, fruta, perime, bishtajore dhe drithëra integrale.</p><div class="box">Karbohidratet nuk të shëndoshin vetë. Teprica e kalorive është problemi.</div>`],de:['KOHLENHYDRATE — ENERGIE',`<p>Kohlenhydrate liefern Energie für Training und Alltag.</p><h2>Orientierung</h2><ul><li>2–3 g/kg: geringe Aktivität</li><li>3–5 g/kg: regelmäßiges Training</li><li>5–7 g/kg: hohe Belastung</li></ul><p>Haferflocken, Reis, Kartoffeln, Obst, Gemüse und Vollkornprodukte bevorzugen.</p>`],en:['CARBOHYDRATES — PERFORMANCE FUEL',`<p>Carbohydrates provide energy for training and daily activity.</p><h2>General range</h2><ul><li>2–3 g/kg: low activity</li><li>3–5 g/kg: regular fitness</li><li>5–7 g/kg: high training load</li></ul><p>Prioritize oats, rice, potatoes, fruit, vegetables and whole grains.</p>`]},
fats:{image:'https://images.unsplash.com/photo-1498837167922-ddd27525d352?auto=format&fit=crop&w=1400&q=85',sq:['YNDYRNAT — TË MIRAT DHE TË KËQIJAT',`<p>Yndyrnat ndihmojnë hormonet, trurin dhe përthithjen e vitaminave A, D, E dhe K.</p><h2>Sa duhet?</h2><p>Rreth 0.8–1.2 g/kg është interval i zakonshëm. Një gram yndyrë ka 9 kcal.</p><h2>Zgjidh</h2><p>Vaj ulliri, arra, fara, avokado, salmon dhe sardele.</p><h2>Kufizo</h2><p>Yndyrna trans, ushqime të skuqura shpesh, fast food dhe mishra shumë të përpunuar.</p><div class="box">Edhe yndyrnat e mira duhen matur, sepse janë shumë kalorike.</div>`],de:['FETTE — GUTE UND SCHLECHTE WAHLEN',`<p>Fette unterstützen Hormone, Gehirn und fettlösliche Vitamine.</p><h2>Gute Quellen</h2><p>Olivenöl, Nüsse, Samen, Avocado und fetter Fisch.</p><h2>Begrenzen</h2><p>Transfette, häufig Frittiertes und stark verarbeitete Lebensmittel.</p>`],en:['FATS — BETTER AND WORSE CHOICES',`<p>Fats support hormones, brain health and fat-soluble vitamins.</p><h2>Better sources</h2><p>Olive oil, nuts, seeds, avocado and oily fish.</p><h2>Limit</h2><p>Trans fats, frequent fried foods and highly processed foods.</p>`]},
strength:{image:'https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=1400&q=85',sq:['GUIDA E FORCËS',`<p>Progresi vjen nga teknikë e mirë, program i thjeshtë dhe rritje graduale e ngarkesës.</p><h2>Parimet kryesore</h2><ul><li>Stërvit çdo grup muskulor 2 herë në javë.</li><li>Mbaj 1–3 përsëritje rezervë në shumicën e seteve.</li><li>Shëno peshat dhe përsëritjet.</li><li>Rrit peshën vetëm kur forma mbetet e pastër.</li></ul>`],de:['KRAFT-GUIDE',`<p>Fortschritt entsteht durch saubere Technik, einen einfachen Plan und schrittweise Steigerung.</p>`],en:['STRENGTH GUIDE',`<p>Progress comes from solid technique, a simple plan and gradual overload.</p>`]},
recovery:{image:'https://images.unsplash.com/photo-1541781774459-bb2af2f05b55?auto=format&fit=crop&w=1400&q=85',sq:['GUIDA E RIKUPERIMIT',`<p>Pa rikuperim, stërvitja kthehet në lodhje pa progres.</p><h2>Bazat</h2><ul><li>7–9 orë gjumë.</li><li>Proteinë dhe kalori të mjaftueshme.</li><li>1–3 ditë pushimi sipas ngarkesës.</li><li>Ulje e volumit kur performanca bie disa seanca radhazi.</li></ul>`],de:['RECOVERY-GUIDE',`<p>Ohne Erholung wird Training zu Müdigkeit ohne Fortschritt.</p>`],en:['RECOVERY GUIDE',`<p>Without recovery, training becomes fatigue without progress.</p>`]}}
const q=new URLSearchParams(location.search);const topic=guides[q.get('topic')]?q.get('topic'):'protein';let lang=localStorage.getItem('nk-lang')||'sq';function render(){const g=guides[topic],v=g[lang]||g.sq;document.documentElement.lang=lang;document.getElementById('title').textContent=v[0];document.getElementById('content').innerHTML=v[1];document.getElementById('image').src=g.image;document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang))}document.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;localStorage.setItem('nk-lang',lang);render()});render();
</script></body></html>
