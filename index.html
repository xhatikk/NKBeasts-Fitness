attform mit Artikeln, Tools und praktischen Anleitungen zu Ernährung, Training, Fettabbau und Regeneration.", "openlib": "Bibliothek öffnen", "usecalc": "Rechner nutzen", "latest": "Neueste Artikel", "latestp": "Suche und filtere Inhalte nach dem Thema, das dich interessiert.", "search": "Artikel suchen...", "all": "Alle", "nutrition": "Ernährung", "training": "Training", "fat": "Fettabbau", "recovery": "Regeneration", "supplements": "Supplemente", "read": "Artikel lesen", "calorie": "Kalorienrechner", "protein": "Proteinrechner", "sex": "Geschlecht", "male": "Männlich", "female": "Weiblich", "age": "Alter", "weight": "Gewicht (kg)", "height": "Größe (cm)", "activity": "Aktivität", "goal": "Ziel", "calculate": "Berechnen", "light": "Leicht", "moderate": "Mittel", "high": "Hoch", "maintenance": "Geschätzter täglicher Erhaltungsbedarf", "target": "Orientierender Tageswert", "abouttitle": "Fitness ohne leere Versprechen", "abouttext": "NKBeasts Fitness macht Fitness verständlicher für Menschen mit Arbeit, Familie und realistischen Zielen. Die Inhalte dienen der Information und ersetzen keine medizinische Beratung.", "contacttitle": "NKBeasts kontaktieren", "privacy": "Datenschutz", "terms": "Bedingungen", "cookies": "Cookies", "medical": "Gesundheitshinweis", "close": "Schließen", "newsletter": "Neue Artikel erhalten", "email": "Deine E-Mail", "subscribe": "Anmelden", "disclaimer": "Die Informationen dienen der Bildung und ersetzen keine medizinische Diagnose oder Behandlung."}, "en": {"home": "Home", "library": "Library", "calculators": "Calculators", "about": "About", "contact": "Contact", "eyebrow": "Practical fitness for real people", "hero": "Build your body.<br><span>Strengthen your mind.</span>", "intro": "A platform with articles, tools, and practical guidance for nutrition, training, fat loss, and recovery.", "openlib": "Open the library", "usecalc": "Use calculators", "latest": "Latest articles", "latestp": "Search and filter content by the topic that interests you.", "search": "Search articles...", "all": "All", "nutrition": "Nutrition", "training": "Training", "fat": "Fat loss", "recovery": "Recovery", "supplements": "Supplements", "read": "Read article", "calorie": "Calorie calculator", "protein": "Protein calculator", "sex": "Sex", "male": "Male", "female": "Female", "age": "Age", "weight": "Weight (kg)", "height": "Height (cm)", "activity": "Activity", "goal": "Goal", "calculate": "Calculate", "light": "Light", "moderate": "Moderate", "high": "High", "maintenance": "Estimated daily maintenance calories", "target": "Estimated daily target", "abouttitle": "Fitness without empty promises", "abouttext": "NKBeasts Fitness makes fitness easier to understand for people with work, family, and realistic goals. The content is educational and does not replace medical advice.", "contacttitle": "Contact NKBeasts", "privacy": "Privacy", "terms": "Terms", "cookies": "Cookies", "medical": "Health disclaimer", "close": "Close", "newsletter": "Get new articles", "email": "Your email", "subscribe": "Subscribe", "disclaimer": "The information is educational and does not replace medical diagnosis or treatment."}};
const ARTICLES=[{"cat": "nutrition", "image": "https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Sa proteinë të duhet realisht?", "summary": "Një udhëzim praktik sipas peshës, moshës dhe qëllimit tënd.", "body": "Proteina ndihmon në ruajtjen dhe ndërtimin e masës muskulore. Për shumicën e personave aktivë, një interval praktik është rreth 1.6–2.0 gram për kilogram peshë trupore në ditë. Nuk është e nevojshme që çdo vakt të jetë perfekt; më e rëndësishme është sasia totale ditore dhe vazhdimësia."}, "de": {"title": "Wie viel Protein brauchst du wirklich?", "summary": "Ein praktischer Leitfaden nach Gewicht, Alter und Ziel.", "body": "Protein unterstützt den Erhalt und Aufbau von Muskelmasse. Für viele aktive Menschen ist ein praktischer Bereich von etwa 1,6–2,0 Gramm pro Kilogramm Körpergewicht pro Tag sinnvoll. Nicht jede Mahlzeit muss perfekt sein; wichtiger sind die Tagesmenge und die Konstanz."}, "en": {"title": "How much protein do you really need?", "summary": "A practical guide based on weight, age, and goals.", "body": "Protein supports muscle maintenance and growth. For many active adults, a practical range is around 1.6–2.0 grams per kilogram of body weight per day. Every meal does not need to be perfect; total daily intake and consistency matter more."}}, {"cat": "fat", "image": "https://images.unsplash.com/photo-1538805060514-97d9cc17730c?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Deficiti kalorik pa uri ekstreme", "summary": "Si të humbasësh yndyrë duke ruajtur energjinë dhe muskujt.", "body": "Humbja e yndyrës kërkon një deficit kalorik, por ai nuk duhet të jetë ekstrem. Një ulje e moderuar prej rreth 300–500 kalorish në ditë është zakonisht më e lehtë për t’u mbajtur. Mbaj proteinën lart, përdor ushqime me volum dhe vazhdo stërvitjen me pesha."}, "de": {"title": "Kaloriendefizit ohne extreme Diät", "summary": "Fett verlieren und gleichzeitig Energie sowie Muskeln erhalten.", "body": "Fettverlust erfordert ein Kaloriendefizit, aber es muss nicht extrem sein. Eine moderate Reduktion von ungefähr 300–500 Kalorien pro Tag ist oft leichter durchzuhalten. Halte die Proteinzufuhr hoch, nutze volumenreiche Lebensmittel und trainiere weiter mit Gewichten."}, "en": {"title": "A calorie deficit without extreme dieting", "summary": "Lose fat while protecting energy and muscle.", "body": "Fat loss requires a calorie deficit, but it does not need to be extreme. A moderate reduction of roughly 300–500 calories per day is often easier to sustain. Keep protein high, choose high-volume foods, and continue resistance training."}}, {"cat": "training", "image": "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Si funksionon progressive overload?", "summary": "Mëso si të rritësh forcën dhe muskujt në mënyrë të matshme.", "body": "Progressive overload do të thotë t’i japësh trupit një stimul pak më të madh me kalimin e kohës. Kjo mund të bëhet duke shtuar peshë, përsëritje, seri ose duke përmirësuar teknikën. Mbaj shënime dhe mos e ndrysho programin çdo javë."}, "de": {"title": "Wie funktioniert Progressive Overload?", "summary": "Kraft und Muskeln messbar steigern.", "body": "Progressive Overload bedeutet, dem Körper mit der Zeit einen etwas stärkeren Reiz zu geben. Das kann durch mehr Gewicht, Wiederholungen, Sätze oder bessere Technik geschehen. Dokumentiere dein Training und wechsle nicht jede Woche das Programm."}, "en": {"title": "How progressive overload works", "summary": "Build strength and muscle with measurable progress.", "body": "Progressive overload means gradually giving your body a slightly greater stimulus. You can do this by adding weight, repetitions, sets, or improving technique. Track your training and avoid changing programs every week."}}, {"cat": "recovery", "image": "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Gjumi dhe rikuperimi", "summary": "Pse gjumi është po aq i rëndësishëm sa programi i stërvitjes.", "body": "Muskujt nuk rriten vetëm gjatë stërvitjes; ata përshtaten gjatë rikuperimit. Syno një orar të qëndrueshëm gjumi, redukto kafeinën vonë dhe mos e neglizho lodhjen kronike. Performanca e dobët shpesh është sinjal rikuperimi, jo mungesë motivimi."}, "de": {"title": "Schlaf und Regeneration", "summary": "Warum Schlaf genauso wichtig ist wie das Trainingsprogramm.", "body": "Muskeln wachsen nicht nur im Training; die Anpassung findet in der Regeneration statt. Achte auf einen regelmäßigen Schlafrhythmus, reduziere spätes Koffein und ignoriere chronische Müdigkeit nicht. Schlechte Leistung ist oft ein Regenerationssignal."}, "en": {"title": "Sleep and recovery", "summary": "Why sleep matters as much as the training plan.", "body": "Muscles do not grow only during training; adaptation happens during recovery. Aim for a consistent sleep schedule, reduce late caffeine, and do not ignore chronic fatigue. Poor performance is often a recovery signal rather than a motivation problem."}}, {"cat": "supplements", "image": "https://images.unsplash.com/photo-1593095948071-474c5cc2989d?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Kreatina: bazat pa marketing", "summary": "Çfarë bën kreatina, si përdoret dhe çfarë nuk bën.", "body": "Kreatina monohidrat është një nga suplementet më të studiuara për forcë dhe performancë. Shumica e njerëzve përdorin 3–5 gram në ditë. Nuk zëvendëson ushqimin, gjumin ose stërvitjen dhe nuk është produkt magjik."}, "de": {"title": "Kreatin: Grundlagen ohne Marketing", "summary": "Wirkung, Anwendung und Grenzen verständlich erklärt.", "body": "Kreatin-Monohydrat gehört zu den am besten untersuchten Supplementen für Kraft und Leistung. Viele Menschen verwenden 3–5 Gramm täglich. Es ersetzt weder Ernährung noch Schlaf oder Training und ist kein Wundermittel."}, "en": {"title": "Creatine basics without the hype", "summary": "What creatine does, how to use it, and its limits.", "body": "Creatine monohydrate is one of the most studied supplements for strength and performance. Many people use 3–5 grams per day. It does not replace food, sleep, or training, and it is not a magic product."}}, {"cat": "nutrition", "image": "https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Si t’i planifikosh vaktet", "summary": "Një sistem i thjeshtë për një javë më të organizuar.", "body": "Planifikimi i vakteve nuk kërkon receta të komplikuara. Zgjidh dy burime proteinash, dy karbohidrate, disa perime dhe një ose dy ushqime të shpejta rezervë. Përgatit bazat dy herë në javë dhe mbaj porcionet fleksibile."}, "de": {"title": "Mahlzeiten sinnvoll planen", "summary": "Ein einfaches System für eine organisierte Woche.", "body": "Mahlzeitenplanung braucht keine komplizierten Rezepte. Wähle zwei Proteinquellen, zwei Kohlenhydratquellen, Gemüse und ein oder zwei schnelle Reservegerichte. Bereite die Grundlagen zweimal pro Woche vor und halte die Portionen flexibel."}, "en": {"title": "How to plan your meals", "summary": "A simple system for a more organized week.", "body": "Meal planning does not require complicated recipes. Choose two protein sources, two carbohydrate sources, several vegetables, and one or two quick backup meals. Prepare the basics twice per week and keep portions flexible."}}, {"cat": "training", "image": "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Programi full-body për fillestarë", "summary": "Tre ditë në javë për forcë dhe muskuj.", "body": "Një program full-body 3 herë në javë është zgjedhje e fortë për fillestarët. Përdor një shtytje, një tërheqje, një ushtrim për këmbë dhe pak punë për krahët e barkun. Fokuso teknikën dhe progresin gradual."}, "de": {"title": "Ganzkörperplan für Anfänger", "summary": "Drei Tage pro Woche für Kraft und Muskeln.", "body": "Ein Ganzkörperplan dreimal pro Woche ist eine starke Wahl für Anfänger. Nutze eine Druckübung, eine Zugübung, eine Beinübung und etwas Arbeit für Arme und Rumpf. Konzentriere dich auf Technik und schrittweisen Fortschritt."}, "en": {"title": "A full-body beginner program", "summary": "Three days per week for strength and muscle.", "body": "A three-day full-body program is a strong choice for beginners. Use one push, one pull, one leg movement, and a small amount of arm and core work. Focus on technique and gradual progress."}}, {"cat": "fat", "image": "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Pse pesha ndalet për disa javë?", "summary": "Si ta kuptosh plateau-n pa panik.", "body": "Pesha mund të ndalet për shkak të ujit, stresit, gjumit ose ndryshimeve në tretje. Shiko mesataren 7-ditore, jo vetëm një matje. Nëse trendi nuk ndryshon për 2–3 javë, bëj një rregullim të vogël në kalori ose aktivitet."}, "de": {"title": "Warum stagniert das Gewicht?", "summary": "Plateaus verstehen, ohne in Panik zu geraten.", "body": "Das Gewicht kann wegen Wasser, Stress, Schlaf oder Verdauung stagnieren. Betrachte den 7-Tage-Durchschnitt statt einer einzelnen Messung. Wenn sich der Trend 2–3 Wochen nicht verändert, passe Kalorien oder Aktivität leicht an."}, "en": {"title": "Why does body weight stall?", "summary": "Understand plateaus without panicking.", "body": "Body weight can stall because of water, stress, sleep, or digestion changes. Look at a seven-day average rather than one measurement. If the trend does not change for two to three weeks, make a small calorie or activity adjustment."}}, {"cat": "recovery", "image": "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Stresi dhe performanca", "summary": "Si ndikon stresi në energji, oreks dhe stërvitje.", "body": "Stresi i lartë mund të ndikojë në gjumë, oreks dhe përqendrim. Nuk ke nevojë të ndalosh çdo gjë, por mund të ulësh volumin e stërvitjes përkohësisht dhe të mbash rutinën bazë. Një plan fleksibil është më i mirë se braktisja totale."}, "de": {"title": "Stress und Leistung", "summary": "Wie Stress Energie, Appetit und Training beeinflusst.", "body": "Hoher Stress kann Schlaf, Appetit und Konzentration beeinflussen. Du musst nicht alles stoppen, kannst aber das Trainingsvolumen vorübergehend senken und die Grundroutine beibehalten. Ein flexibler Plan ist besser als kompletter Abbruch."}, "en": {"title": "Stress and performance", "summary": "How stress affects energy, appetite, and training.", "body": "High stress can affect sleep, appetite, and concentration. You do not need to stop everything, but you can temporarily reduce training volume while keeping the basic routine. A flexible plan is better than quitting completely."}}, {"cat": "nutrition", "image": "https://images.unsplash.com/photo-1505253716362-afaea1d3d1af?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Karbohidratet dhe energjia", "summary": "Pse karbohidratet nuk janë armiku.", "body": "Karbohidratet janë burim i rëndësishëm energjie, sidomos për stërvitje intensive. Sasia e nevojshme ndryshon sipas aktivitetit dhe qëllimit. Fokuso drithërat, patatet, orizin, frutat dhe porcionet që i përshtaten kalorive të tua."}, "de": {"title": "Kohlenhydrate und Energie", "summary": "Warum Kohlenhydrate nicht der Feind sind.", "body": "Kohlenhydrate sind eine wichtige Energiequelle, besonders bei intensivem Training. Der Bedarf hängt von Aktivität und Ziel ab. Nutze Getreide, Kartoffeln, Reis, Obst und Portionsgrößen, die zu deinem Kalorienziel passen."}, "en": {"title": "Carbohydrates and energy", "summary": "Why carbohydrates are not the enemy.", "body": "Carbohydrates are an important energy source, especially for intense training. Needs vary by activity level and goals. Focus on grains, potatoes, rice, fruit, and portions that fit your calorie target."}}, {"cat": "training", "image": "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "Sa seri duhen për muskuj?", "summary": "Volumi i stërvitjes i shpjeguar thjesht.", "body": "Shumica e njerëzve përparojnë me rreth 8–16 seri pune për grup muskulor në javë, por nevoja ndryshon. Fillimi me volum më të ulët dhe shtimi gradual është zakonisht më i mençur sesa nisja me shumë seri."}, "de": {"title": "Wie viele Sätze für Muskelaufbau?", "summary": "Trainingsvolumen einfach erklärt.", "body": "Viele Menschen machen mit ungefähr 8–16 Arbeitssätzen pro Muskelgruppe und Woche Fortschritte, aber der Bedarf ist individuell. Mit weniger Volumen zu starten und langsam zu steigern ist meist klüger als direkt zu viel zu machen."}, "en": {"title": "How many sets build muscle?", "summary": "Training volume explained simply.", "body": "Many people progress with around 8–16 working sets per muscle group per week, but individual needs vary. Starting with lower volume and adding gradually is usually smarter than doing too much immediately."}}, {"cat": "supplements", "image": "https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?auto=format&fit=crop&w=1200&q=84", "sq": {"title": "A të duhet proteinë pluhur?", "summary": "Kur whey është i dobishëm dhe kur nuk është i nevojshëm.", "body": "Proteina pluhur është thjesht ushqim praktik. Mund të ndihmojë kur nuk e arrin proteinën me ushqim, por nuk është e domosdoshme. Kontrollo etiketën, përbërësit dhe tolerancën personale."}, "de": {"title": "Brauchst du Proteinpulver?", "summary": "Wann Whey praktisch ist und wann nicht.", "body": "Proteinpulver ist in erster Linie ein praktisches Lebensmittel. Es kann helfen, wenn du dein Proteinziel nicht über normale Nahrung erreichst, ist aber nicht zwingend notwendig. Prüfe Etikett, Zutaten und Verträglichkeit."}, "en": {"title": "Do you need protein powder?", "summary": "When whey is useful and when it is unnecessary.", "body": "Protein powder is mainly a convenient food. It can help when you struggle to reach your protein target with regular meals, but it is not essential. Check the label, ingredients, and personal tolerance."}}];

function applyLanguage(){
 document.documentElement.lang=lang;
 document.querySelectorAll('[data-k]').forEach(el=>{
  const k=el.dataset.k;
  if(UI[lang][k]!==undefined) el.innerHTML=UI[lang][k];
 });
 document.querySelectorAll('[data-ph]').forEach(el=>el.placeholder=UI[lang][el.dataset.ph]);
 document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
 renderArticles();
}

function renderArticles(){
 const grid=document.getElementById('articleGrid');
 const q=query.toLowerCase();
 grid.innerHTML='';
 ARTICLES.forEach((a,i)=>{
  const t=a[lang];
  if(filter!=='all' && a.cat!==filter) return;
  if(q && !(t.title+' '+t.summary+' '+t.body).toLowerCase().includes(q)) return;
  const catLabel=UI[lang][a.cat]||a.cat;
  const card=document.createElement('article');
  card.className='card';
  card.innerHTML=`<img src="${a.image}" alt="${t.title}"><div class="pad"><span class="tag">${catLabel}</span><h3>${t.title}</h3><p>${t.summary}</p><button class="read" style="background:none;border:0;padding:0;cursor:pointer">${UI[lang].read} →</button></div>`;
  card.querySelector('button').onclick=()=>openArticle(i);
  grid.appendChild(card);
 });
}

function openArticle(i){
 const a=ARTICLES[i],t=a[lang],catLabel=UI[lang][a.cat]||a.cat;
 document.getElementById('modalContent').innerHTML=`<span class="tag">${catLabel}</span><h1>${t.title}</h1><img class="articlehero" src="${a.image}" alt="${t.title}"><div class="articlebody"><p>${t.body}</p><h2>${UI[lang].latest}</h2><p>${t.summary}</p><div class="notice">${UI[lang].disclaimer}</div></div>`;
 document.getElementById('modal').classList.add('open');
}

document.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;applyLanguage()});
document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderArticles()});
document.getElementById('search').addEventListener('input',e=>{query=e.target.value;renderArticles()});
document.querySelectorAll('[data-legal]').forEach(b=>b.onclick=()=>{document.getElementById('modalContent').innerHTML=legal[lang][b.dataset.legal];document.getElementById('modal').classList.add('open')});
document.getElementById('close').onclick=()=>document.getElementById('modal').classList.remove('open');

document.getElementById('calForm').onsubmit=e=>{

 const bmr=10*weight+6.25*height-5*age+(sex==='m'?5:-161);
 document.getElementById('calResult').innerHTML=`<strong>${Math.round(bmr*activity)} kcal</strong><br>${UI[lang].maintenance}`;
};
document.getElementById('proteinForm').onsubmit=e=>{

};
